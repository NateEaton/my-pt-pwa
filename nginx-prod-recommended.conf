# Production My PT App
# Optimized for PWA with proper service worker updates AND offline support
server {
    listen 80;
    server_name my-pt.eatonfamily.net;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.workers.dev; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:;" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CRITICAL: Service Worker - Always check for updates, but allow offline use
    # no-cache = revalidate with server, but use cached version if offline
    location = /sw.js {
        root /usr/share/nginx/html/my-pt;
        add_header Cache-Control "no-cache, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Workbox runtime - also always check for updates
    location ~* /workbox-.*\.js$ {
        root /usr/share/nginx/html/my-pt;
        add_header Cache-Control "no-cache, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # HTML - never cache (ensures latest entry point)
    location = /index.html {
        root /usr/share/nginx/html/my-pt;
        add_header Cache-Control "no-cache, max-age=0" always;
        try_files $uri =404;
    }

    # Manifest - short cache
    location = /manifest.webmanifest {
        root /usr/share/nginx/html/my-pt;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/manifest+json";
    }

    # Static assets with content hashes - LONG cache is safe
    # SvelteKit/Vite generates filenames like: app.ABC123.js
    location ~* /_app/immutable/.*\.(js|css)$ {
        root /usr/share/nginx/html/my-pt;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html/my-pt;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Everything else - SPA fallback
    location / {
        root /usr/share/nginx/html/my-pt;
        try_files $uri $uri/ /index.html;
    }
}
