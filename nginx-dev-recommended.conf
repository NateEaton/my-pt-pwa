# Development/Staging environment for My PT App
# Optimized for PWA with proper service worker updates AND offline support
server {
    listen 80;
    server_name my-pt-dev.eatonfamily.net;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.workers.dev; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob:;" always;

    # CRITICAL: Service Worker - Always check for updates, but allow offline use
    # no-cache = revalidate with server, but use cached version if offline
    location = /my-pt-pwa-dev/sw.js {
        alias /usr/share/nginx/html/my-pt-pwa-dev/sw.js;
        add_header Cache-Control "no-cache, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Workbox runtime - also always check for updates
    location ~ ^/my-pt-pwa-dev/workbox-.*\.js$ {
        alias /usr/share/nginx/html/my-pt-pwa-dev/;
        add_header Cache-Control "no-cache, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # HTML - never cache (ensures latest entry point)
    location = /my-pt-pwa-dev/index.html {
        alias /usr/share/nginx/html/my-pt-pwa-dev/index.html;
        add_header Cache-Control "no-cache, max-age=0" always;
        try_files $uri =404;
    }

    # Manifest - short cache (1 hour is fine for manifest)
    location = /my-pt-pwa-dev/manifest.webmanifest {
        alias /usr/share/nginx/html/my-pt-pwa-dev/manifest.webmanifest;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/manifest+json";
    }

    # Static assets with content hashes - LONG cache is safe
    # These have content hashes in filenames (app.ABC123.js), so caching is safe
    location ~ ^/my-pt-pwa-dev/_app/immutable/.*\.(js|css)$ {
        alias /usr/share/nginx/html/my-pt-pwa-dev/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static assets - moderate cache
    location ~ ^/my-pt-pwa-dev/.*\.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /usr/share/nginx/html/my-pt-pwa-dev/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Main app location - SPA fallback
    location /my-pt-pwa-dev/ {
        alias /usr/share/nginx/html/my-pt-pwa-dev/;
        try_files $uri $uri/ /my-pt-pwa-dev/index.html;
    }

    # Catch all other paths and redirect to the app base path
    location / {
        return 302 /my-pt-pwa-dev$request_uri;
    }
}
